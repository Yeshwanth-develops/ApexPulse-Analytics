<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="trackGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="200" fill="#111827"/>
  
  <!-- Generic Circuit Track -->
  <path d="M 50 100 Q 100 50, 150 50 L 250 50 Q 300 50, 350 100 L 350 150 Q 300 180, 250 180 L 150 180 Q 100 180, 50 150 Z" 
        fill="none" stroke="url(#trackGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Center line dashes -->
  <line x1="50" y1="100" x2="350" y2="100" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
  
  <!-- Corner markers -->
  <circle cx="75" cy="75" r="3" fill="#60a5fa"/>
  <circle cx="325" cy="75" r="3" fill="#60a5fa"/>
  <circle cx="75" cy="125" r="3" fill="#60a5fa"/>
  <circle cx="325" cy="125" r="3" fill="#60a5fa"/>
  
  <!-- Text -->
  <text x="200" y="30" font-size="12" fill="#9ca3af" text-anchor="middle">CIRCUIT</text>
  <text x="200" y="175" font-size="10" fill="#6b7280" text-anchor="middle" opacity="0.7">F1 Track Layout</text>
</svg>
